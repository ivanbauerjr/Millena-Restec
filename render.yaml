services:
  - type: web
    name: devedores-contumazes-pr
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
        sync: false
